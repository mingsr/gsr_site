<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Seru - Rudolf</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:700px;
      animation: fadeIn 1.5s ease;
    }

    .logo{
      width:120px;
      margin-bottom:20px;
      filter: drop-shadow(0 0 15px #41b8d5);
    }

    h1{
      font-size:48px;
      margin-bottom:15px;
      color:#41b8d5;
      text-shadow:0 0 15px rgba(65,184,213,0.7);
    }

    p{
      font-size:18px;
      line-height:1.7;
      color:#d1d5db;
      margin-bottom:25px;
    }

    .status{
      display:inline-block;
      padding:12px 25px;
      border-radius:999px;
      background:#31356e;
      color:white;
      font-weight:bold;
      box-shadow:0 0 20px rgba(49,53,110,0.6);
      margin-bottom:25px;
    }

    .socials a{
      text-decoration:none;
      color:white;
      margin:0 10px;
      transition:0.3s;
      font-size:16px;
    }

    .socials a:hover{
      color:#41b8d5;
    }

    .footer{
      margin-top:35px;
      font-size:14px;
      color:#9ca3af;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:600px){
      h1{
        font-size:34px;
      }

      p{
        font-size:16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Logo_TV_2015.png" class="logo">

    <h1>WEBSITE SEDANG DIRENOVASI 🚧</h1>

    <div class="status">
      GSR WEB REWORK IN PROGRESS
    </div>

    <p>
      Game Seru - Rudolf sedang melakukan
      perombakan besar untuk menghadirkan
      tampilan yang lebih modern, cepat,
      dan lebih seru untuk komunitas gaming 🔥
    </p>

    <div class="socials">
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
      <a href="#">YouTube</a>
    </div>

    <div class="footer">
      © 2026 Game Seru - Rudolf
    </div>

  </div>

</body>
</html>
