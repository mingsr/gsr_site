<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Game Seru - Rudolf</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:700px;
      animation:fade 1.2s ease;
    }

    .logo{
      width:140px;
      margin-bottom:25px;
      border-radius:25px;
      box-shadow:0 0 25px rgba(65,184,213,0.5);
    }

    h1{
      font-size:48px;
      color:#41b8d5;
      margin-bottom:15px;
      text-shadow:0 0 20px rgba(65,184,213,0.7);
    }

    .badge{
      display:inline-block;
      background:#31356e;
      padding:12px 24px;
      border-radius:999px;
      margin-bottom:25px;
      font-weight:bold;
      box-shadow:0 0 20px rgba(49,53,110,0.5);
    }

    p{
      color:#d1d5db;
      font-size:18px;
      line-height:1.7;
    }

    .footer{
      margin-top:40px;
      font-size:14px;
      color:#9ca3af;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:600px){

      h1{
        font-size:34px;
      }

      p{
        font-size:16px;
      }

      .logo{
        width:110px;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <img src="logo.jpg" class="logo">

    <h1>WEBSITE SEDANG DIRENOVASI 🚧</h1>

    <div class="badge">
      GSR WEB REWORK
    </div>

    <p>
      Website Game Seru - Rudolf sedang dalam proses
      perombakan besar untuk menghadirkan tampilan
      yang lebih modern, lebih cepat, dan lebih seru
      untuk seluruh komunitas gaming 🔥
    </p>

    <div class="footer">
      © 2026 Game Seru - Rudolf
    </div>

  </div>

</body>
</html>
